name: Release forwarder APK

on:
  push:
    tags: ['forwarder-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      # debug-signed APK is fine here: it's installable for sideload and
      # needs no keystore secrets. Not for Play Store, which we don't use.
      - run: cd forwarder-android && ./gradlew assembleDebug --no-daemon
      # the PWA download button expects this exact asset name at releases/latest
      - run: cp forwarder-android/app/build/outputs/apk/debug/app-debug.apk splitstream-forwarder.apk
      - uses: softprops/action-gh-release@v2
        with:
          # manual runs have no tag, so mint one from the run number
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('forwarder-manual-{0}', github.run_number) || github.ref_name }}
          files: splitstream-forwarder.apk
