name: Release forwarder APK

on:
  push:
    tags: ['forwarder-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      # Release-signed: Play Protect auto-blocks browser-sideloaded SMS apps in
      # India, and every distribution channel (Obtainium/F-Droid/Play) needs a
      # stable signature. Keystore lives in repo secrets (see docs/forwarder-release.md).
      - name: Decode signing keystore
        run: echo "${{ secrets.FORWARDER_KEYSTORE_B64 }}" | base64 -d > /tmp/forwarder-release.p12
      - run: cd forwarder-android && ./gradlew assembleRelease --no-daemon
        env:
          FORWARDER_KEYSTORE: /tmp/forwarder-release.p12
          FORWARDER_KEYSTORE_PASSWORD: ${{ secrets.FORWARDER_KEYSTORE_PASSWORD }}
      # the PWA download button expects this exact asset name at releases/latest
      - run: cp forwarder-android/app/build/outputs/apk/release/app-release.apk splitstream-forwarder.apk
      - uses: softprops/action-gh-release@v2
        with:
          # manual runs have no tag, so mint one from the run number
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('forwarder-manual-{0}', github.run_number) || github.ref_name }}
          files: splitstream-forwarder.apk
